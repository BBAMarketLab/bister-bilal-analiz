          <p>Bu senaryo, savaşların artık sadece toprak ve silahla kazanılmadığını gösteriyor. 21. yüzyılın savaşları, bir ülkenin ya da bölgenin beynini hedef alıyor. O beyin, dijital altyapıdır.</p>
          <p>Bir füze, bir binayı yıkarak belki yüzlerce insanı öldürebilir. Ama bir veri merkezini vurarak milyonlarca insanın hayatını felç edebilirsiniz. Paranıza erişemez, tedavi olamaz, işinize gidemez, evinizi ısıtacak enerjiyi bulamaz hale gelirsiniz.</p>
          <p>İran'ın bu altı şirketi hedef listesine alması, savaşın kurallarının değiştiğinin en büyük işaretidir. Bu, sadece bir füze savaşı değil, bir altyapı savaşıdır. Körfez ülkeleri için bu, petrol fiyatlarından çok daha derin bir kriz anlamına gelir. Bu, modern hayatın kendisinin sorgulanmasıdır.</p>
          <p>Ve belki de en önemlisi, bu savaşın ilk kıvılcımı, ne bir sınır kapısında ne de bir boğazda çakılacak. İlk kıvılcım, bir sunucu odasının sessizliğinde, bir ekranın kararmasıyla başlayacak.</p>
          <p class="author">BİLAL AKSOY</p>
          <p class="author-role">Kurucu & Baş Analist</p>
        `
      }
    ];

    let currentPage = 0;

    const pageBg = document.getElementById("pageBg");
    const pageContent = document.getElementById("pageContent");
    const counter = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideNav = document.getElementById("sideNav");
    const publishDate = document.getElementById("publishDate");

    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    publishDate.textContent = `${day}.${month}.${year}`;

    function renderSideNav() {
      sideNav.innerHTML = "";
      pages.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        if (index === currentPage) btn.classList.add("active");
        btn.addEventListener("click", () => goToPage(index));
        sideNav.appendChild(btn);
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      pageBg.src = page.bg;
      pageContent.innerHTML = page.html;
      counter.textContent = `${currentPage + 1} / ${pages.length}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      renderSideNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goToPage(index){
      if(index < 0 || index >= pages.length || index === currentPage) return;

      pageContent.classList.add("is-leaving");
      pageBg.classList.add("is-leaving");

      setTimeout(() => {
        currentPage = index;
        renderPage();
        pageContent.classList.remove("is-leaving");
        pageBg.classList.remove("is-leaving");
      }, 220);
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) goToPage(currentPage - 1);
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && currentPage > 0) goToPage(currentPage - 1);
      if (e.key === "ArrowRight" && currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    let touchStartX = null;

    document.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (touchStartX === null || e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - touchStartX;

      if (dx > 60 && currentPage > 0) goToPage(currentPage - 1);
      if (dx < -60 && currentPage < pages.length - 1) goToPage(currentPage + 1);

      touchStartX = null;
    }, { passive: true });

    renderPage();
  </script>
</body>
</html>
