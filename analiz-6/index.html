  <style>
    :root{
      --bg:#05070b;
      --panel:#12141b;
      --panel-2:#0d1016;
      --text:#f2f2f2;
      --muted:#c9ced8;
      --gold:#d9b46b;
      --gold-soft:rgba(217,180,107,.28);
      --cyan:#7fd7ff;
      --line:rgba(255,255,255,.08);

      --violet:#d8b4ff;

      --violet-soft:rgba(168,85,247,.38);
      --footer-height:96px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top,#111827 0%,#07090d 45%,#030406 100%);
      color:var(--text);
      font-family:Georgia, "Times New Roman", serif;
      overflow-x:hidden;
    }

    body{min-height:100vh}

    .shell{
      width:min(1280px, 96vw);
      margin:32px auto;
      display:grid;
      grid-template-columns:88px 1fr;
      gap:18px;
      align-items:start;
    }

    .side-nav{
      background:rgba(13,16,22,.75);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 10px;
      box-shadow:var(--shadow);
      position:sticky;
      top:18px;
      backdrop-filter:blur(10px);
    }

    .side-nav button{
      width:40px;
      height:40px;
      margin:10px 0;
      border-radius:50%;
      border:2px solid #d9b46b44;
      background:linear-gradient(180deg,#181818 0%, #232323 100%);
      color:#ffe7b0;
      font-weight:700;
      font-size:18px;
      cursor:pointer;
      transition:.18s;
      box-shadow:0 0 0 #0000;
    }

    .side-nav button.active{
      background:linear-gradient(180deg,#ffe7b0 0%, #d9b46b 100%);
      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 14px #ffe7b088, 0 0 2px #fff8;
      filter:drop-shadow(0 0 8px #d9b46b55);
    }

    .viewer{
      background:linear-gradient(180deg,rgba(28,24,45,.92),rgba(18,20,27,.96));
      border:1.5px solid rgba(255,255,255,.13);
      border-radius:32px;
      box-shadow:
        0 8px 48px 0 rgba(217,180,107,0.18),
        0 2px 32px 0 rgba(127,215,255,0.10),
        0 0 0 2.5px rgba(255,255,255,0.04),
        0 0 120px 0 rgba(123,88,255,0.10);

    .viewer-header{
      display:flex;

      background:
        linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,0)),
        linear-gradient(90deg,rgba(217,180,107,0.06) 0%,rgba(255,255,255,0) 100%);
      box-shadow:0 2px 18px 0 rgba(217,180,107,0.06);

    }

    .brand-pill{
      font-size:16px;

      letter-spacing:.6px;
      border-radius:20px;
      background:linear-gradient(135deg,#1a2a45,#0d1628);
      border:1px solid rgba(255,210,120,0.35);
      box-shadow:0 0 10px rgba(255,210,120,0.25);

    .date{

    .page-wrap{
      padding:22px 22px 24px;
    }

    .page{
      width:min(100%, 794px);
      min-height:1123px;
      margin:0 auto;
      border-radius:24px;
      overflow:hidden;
      position:relative;
      border:2.5px solid var(--gold-soft);
      box-shadow:
        0 0 0 2.5px #d9b46b33 inset,
        0 0 32px #d9b46b33 inset,
        0 0 60px #7fd7ff18 inset,
        0 0 44px 0 rgba(217,180,107,0.13),
        0 2px 24px 0 rgba(127,215,255,0.08);
      background:#0a0d13;
      backdrop-filter:blur(8px) saturate(1.10);
      transition:box-shadow .3s;
    }

    .page-bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(.90) contrast(1.06) saturate(1.10);
      transform:scale(1.02);
      transition:opacity .36s ease, transform .5s ease;
      opacity:1;
    }

    .page-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(7,10,16,.26) 0%, rgba(7,10,16,.22) 18%, rgba(7,10,16,.34) 48%, rgba(7,10,16,.50) 100%),
        linear-gradient(90deg, rgba(11,14,21,.44) 0%, rgba(11,14,21,.24) 40%, rgba(11,14,21,.34) 100%),
        radial-gradient(ellipse at top center, rgba(255,231,176,0.10) 0%, rgba(255,231,176,0.00) 70%);
      pointer-events:none;
      z-index:1;
    }

    .page-content{
      position:relative;
      z-index:2;
      max-width:860px;
      padding:42px 38px 54px;
      transition:opacity .30s ease, transform .36s ease;
      opacity:1;
      transform:translateY(0);
    }

    .page-content.is-leaving{
      opacity:0;
      transform:translateY(10px);
    }

    .page-bg.is-leaving{
      opacity:.2;
      transform:scale(1.04);
    }

    .page-title{
      margin:0 0 18px;
      font-size:clamp(44px, 5vw, 72px);
      line-height:1.08;
      font-weight:900;
      color:#ffe7b0;
      text-shadow:0 0 24px #d9b46b99, 0 2px 10px #000a, 0 0 2px #fff8;
      letter-spacing:-.4px;
      filter:drop-shadow(0 0 12px #d9b46b66);
    }

    .page-subtitle{
      margin:26px 0 12px;
      font-size:clamp(24px, 2.5vw, 38px);
      line-height:1.15;
      font-weight:800;
      color:var(--violet);
      text-shadow:
        0 0 10px var(--violet-strong),
        0 0 22px rgba(168,85,247,.42),
        0 2px 10px rgba(0,0,0,.45);
      filter:drop-shadow(0 0 10px var(--violet-soft));

    .page-content p,
    .page-content li{
      margin:0 0 16px;

    }

    .page-content ul{

    .page-content .author{
      margin-top:28px;

    .page-content .author-role{

    }

    .viewer-footer{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:20;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      min-height:var(--footer-height);
      padding:14px 22px 20px;
      border-top:1.5px solid var(--line);
      background:
        linear-gradient(180deg, rgba(11,14,21,.10) 0%, rgba(11,14,21,.75) 18%, rgba(11,14,21,.96) 100%);
      box-shadow:0 -8px 30px 0 rgba(0,0,0,.28);
      backdrop-filter:blur(10px);
    }

    .viewer-footer .nav-btn{
      min-width:110px;
      border:none;
      border-radius:14px;
      padding:15px 26px;
      font-weight:800;
      font-size:20px;
      cursor:pointer;
      color:#ffe7b0;
      background:linear-gradient(180deg,#181818 0%, #232323 100%);
      border:2px solid #d9b46b44;
      box-shadow:0 0 0 #0000;
      transition:.18s;
      letter-spacing:.5px;
      text-shadow:0 0 10px #d9b46b33;
    }

    .viewer-footer .nav-btn:hover:not(:disabled){
      background:linear-gradient(180deg,#ffe7b0 0%, #d9b46b 100%);
      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 22px #ffe7b099, 0 0 2px #fff8;
      filter:drop-shadow(0 0 10px #d9b46b55);
    }

    .viewer-footer .nav-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .counter{
      font-family:Arial, Helvetica, sans-serif;
      color:#e9eef9;
      font-weight:800;
      font-size:18px;
      letter-spacing:.8px;
    }

    @media (max-width:980px){
      .shell{grid-template-columns:1fr;}
      .side-nav{
        position:static;
        display:flex;
        gap:8px;
        padding:10px;
        overflow:auto;
      }
      .side-nav button{
        min-width:56px;
        margin:0;
      }
      .page{min-height:auto;}
      .page-content{padding:26px 22px 34px;}
      .page-title{font-size:34px;}
      .page-content p,
      .page-content li{
        font-size:17px;
        line-height:1.66;
      }
      .page-overlay{
        background:
          linear-gradient(180deg, rgba(7,10,16,.16) 0%, rgba(7,10,16,.14) 18%, rgba(7,10,16,.22) 48%, rgba(7,10,16,.34) 100%),
          linear-gradient(90deg, rgba(11,14,21,.24) 0%, rgba(11,14,21,.12) 40%, rgba(11,14,21,.20) 100%);
      }
      .page-bg{filter:brightness(.94) contrast(1.10) saturate(1.14);}
    }

    @media (max-width:640px){
      :root{
        --footer-height:88px;
      }

      .viewer-header{padding:16px 16px 12px; gap:10px;}
      .brand-pill{font-size:13px; padding:8px 12px;}
      .date{font-size:12px;}
      .page-wrap{padding:14px 14px 18px;}
      .page-title{font-size:30px;}
      .page-subtitle{font-size:22px;}
      .page-content p,
      .page-content li{font-size:16px;}
      .viewer-footer{padding:12px 14px 16px;}
      .viewer-footer .nav-btn{min-width:92px; padding:10px 12px;}
      .counter{font-size:16px;}
    }

    @media print{
      :root{--footer-height:0px;}
      body{background:#fff;}
      .shell{width:100%; margin:0; display:block;}
      .side-nav, .viewer-header, .viewer-footer{display:none !important;}
      .viewer{border:none; box-shadow:none; border-radius:0; padding-bottom:0;}
      .page-wrap{padding:0;}
      .page{border:none; box-shadow:none; border-radius:0; width:210mm; min-height:297mm;}
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side-nav" id="sideNav"></aside>

    <main class="viewer">
      <div class="viewer-header">
        <div class="brand-pill">Bister Bilal Borsa Akademi</div>
        <div class="date" id="publishDate"></div>
      </div>

      <div class="page-wrap">
        <section class="page">
          <img id="pageBg" class="page-bg" src="" alt="">
          <div class="page-overlay"></div>
          <div id="pageContent" class="page-content"></div>
        </section>
      </div>

      <div class="viewer-footer">
        <button class="nav-btn" id="prevBtn">Önceki</button>
        <div class="counter" id="counter">1 / 3</div>
        <button class="nav-btn" id="nextBtn">Sonraki</button>
      </div>
    </main>
  </div>

  <script>
    const pages = [
      {
        bg: "../page1-bg.png",
        html: `
          <h1 class="page-title">KAN, SAMPANYA VE URGAN</h1>
          <p class="page-subtitle">KNESSET'TE INSANLIGIN IDAMI</p>
          <p>30 Mart 2026 tarihi, dunya siyaset tarihine sadece bir yasanin gectigi gun olarak degil, adalet ve insanlik onurunun bir meclis salonunda kahkahalar esliginde asildigi gun olarak gececek.</p>
          <p>Israil Meclisi'nde 48'e karsi 62 oyla kabul edilen ve Filistinli esirlere yonelik "asilarak idam" cezasini yasallastiran bu karar, hukuki bir metin olmaktan cok uzaktir; bu, bir devletin iliklerine kadar islemis fasizm ve irkcilik enfeksiyonunun tum dunyaya canli yayinda izletilmesidir.</p>
          <p>Mesele sadece olum cezasinin geri getirilmesi degildir; mesele, bu olumun nasil kutsandigi ve nasil bir vahset panayirina donusturuldugudur.</p>
          <p>Bir insanin yasam hakkinin devlet eliyle alinacak olmasini Knesset koridorlarinda sampanya patlatarak kutlamak, meclis genel kuruluna yakasinda "idam ipi (urgan)" rozetiyle girmek ve olum fermaninin serefine tatli dagitmak...</p>
        `
      },
      {
        bg: "../page2-bg.png",
        html: `
          <p>Ulusal Guvenlik Bakani Itamar Ben-Gvir ve partisinin bu kan donduran performansi, politik bir zafer kutlamasi degil, klinik bir sosyopatolojinin, nekro-siyasetin (olum siyasetinin) en igrenc disavurumudur.</p>
          <p>Olumden, kandan ve ipten zevk alan, bunu bir bayram havasinda yasayan bu zihniyet, insanligin ortak vicdaninda onarilamaz bir yara acmistir.</p>
          <p>Daha da vahimi, bu curumuslugun sadece marjinal bir asiri sagci gruba ait olmamasidir.</p>
          <p>Basbakan Benjamin Netanyahu'nun bizzat genel kurula gelerek bu yasaya oyuyla omuz vermesi, bu nefret enfeksiyonunun devletin en zirvesine, kurumsal isleyisin tam kalbine yerlestiginin en net kanitidir.</p>
          <p>Hukukun, evrensel insan haklarinin ve yasatma idealinin yerini; intikam, ayrimcilik ve kurumsallasmis bir apartheid rejimi almistir.</p>
          <p>Avrupa ulkelerinin ve uluslararasi orgutlerin ciliz "kinama" mesajlari, patlatilan o sampanyalarin sesini bastirmaya yetmiyor.</p>
          <p>Yakasinda idam ipi tasiyan karar alicilarin, kendilerinden olmayanlarin olumunu tatli yiyerek kutladigi bir masada, diplomasinin suslu kelimeleri anlamsiz kalir.</p>
        `
      },
      {
        bg: "../page3-bg.png",
        html: `
          <p>Bugun Knesset'te onaylanan sadece bir idam yasasi degildir; bugun Israil, icine dustugu o karanlik ve geri donusu olmayan ahlaki batakligi, kana susamislik enfeksiyonunu tum dunyanin gozu onunde resmilestirmistir.</p>
          <p>Yakasinda urganla gezenlerin yonettigi bir sistemin, dunyaya verebilecegi tek sey daha fazla olum ve felakettir.</p>
          <p>Tarih, bu sampanyali olum kutlamasini ve buna sessiz kalanlari asla unutmayacaktir.</p>
          <p class="author">Bilal AKSOY</p>
          <p class="author-role">BBA Marketlab<br>Kurucu &amp; Bas Analist</p>
        `
      }
    ];

    let currentPage = 0;

    const pageBg = document.getElementById("pageBg");
    const pageContent = document.getElementById("pageContent");
    const counter = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideNav = document.getElementById("sideNav");
    const publishDate = document.getElementById("publishDate");

    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    publishDate.textContent = `${day}.${month}.${year}`;

    function renderSideNav() {
      sideNav.innerHTML = "";
      pages.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        if (index === currentPage) btn.classList.add("active");
        btn.addEventListener("click", () => goToPage(index));
        sideNav.appendChild(btn);
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      pageBg.src = page.bg;
      pageContent.innerHTML = page.html;
      counter.textContent = `${currentPage + 1} / ${pages.length}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      renderSideNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goToPage(index) {
      if (index < 0 || index >= pages.length || index === currentPage) return;

      pageContent.classList.add("is-leaving");
      pageBg.classList.add("is-leaving");

      setTimeout(() => {
        currentPage = index;
        renderPage();
        pageContent.classList.remove("is-leaving");
        pageBg.classList.remove("is-leaving");
      }, 220);
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) goToPage(currentPage - 1);
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && currentPage > 0) goToPage(currentPage - 1);
      if (e.key === "ArrowRight" && currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    let touchStartX = null;

    document.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (touchStartX === null || e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - touchStartX;

      if (dx > 60 && currentPage > 0) goToPage(currentPage - 1);
      if (dx < -60 && currentPage < pages.length - 1) goToPage(currentPage + 1);

      touchStartX = null;
    }, { passive: true });

    renderPage();
  </script>
</body>
</html>
