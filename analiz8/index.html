<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Son Yuzyilin En Buyuk Ayibi | Bister Bilal Analiz</title>

  <style>
    :root{
      --bg:#05070b;
      --panel:#12141b;
      --panel-2:#0d1016;
      --text:#f2f2f2;
      --muted:#c9ced8;
      --gold:#d9b46b;
      --gold-soft:rgba(217,180,107,.28);
      --cyan:#7fd7ff;
      --line:rgba(255,255,255,.08);
      --shadow:0 0 40px rgba(217,180,107,.08);
      --violet:#d8b4ff;
      --violet-strong:rgba(168,85,247,.55);
      --violet-soft:rgba(168,85,247,.38);
      --footer-height:96px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top,#111827 0%,#07090d 45%,#030406 100%);
      color:var(--text);
      font-family:Georgia, "Times New Roman", serif;
      overflow-x:hidden;
    }

    body{min-height:100vh; position:relative;}

    #bgLayer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    #bgLayer::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(70vw 50vh at 18% 20%, rgba(120,180,255,0.12), transparent 74%),
        radial-gradient(55vw 45vh at 82% 70%, rgba(120,180,255,0.10), transparent 76%);
    }

    .bubble {
      position: absolute;
      top: -120px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(120,180,255,0.45) 0%,
        rgba(120,180,255,0.18) 40%,
        transparent 70%);
      box-shadow:
        0 0 30px rgba(120,180,255,0.35),
        0 0 80px rgba(120,180,255,0.18);
      filter: blur(1px);
      animation: floatDown linear infinite;
      will-change: transform, opacity;
    }

    .bubble.outer { filter: blur(2px); }
    .bubble.inner { filter: blur(0.75px); }

    @keyframes floatDown {
      0% { transform: translateY(-120px); opacity: 0; }
      20% { opacity: 0.9; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 2;
      background: rgba(10, 25, 50, 0.45);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .inner-bubbles {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .shell{
      width:min(1280px, 96vw);
      margin:32px auto;
      display:grid;
      grid-template-columns:88px 1fr;
      gap:18px;
      align-items:start;
      position:relative;
      z-index:2;
    }

    .side-nav{
      background:rgba(13,16,22,.75);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 10px;
      box-shadow:var(--shadow);
      position:sticky;
      top:18px;
      backdrop-filter:blur(10px);
    }

    .side-nav button{
      width:40px;
      height:40px;
      margin:10px 0;
      border-radius:50%;
      border:2px solid #d9b46b44;
      background:linear-gradient(180deg,#181818 0%, #232323 100%);
      color:#ffe7b0;
      font-weight:700;
      font-size:18px;
      cursor:pointer;
      transition:.18s;
      box-shadow:0 0 0 #0000;
    }

    .side-nav button.active{
      background:linear-gradient(180deg,#ffe7b0 0%, #d9b46b 100%);
      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 14px #ffe7b088, 0 0 2px #fff8;
      filter:drop-shadow(0 0 8px #d9b46b55);
    }

    .viewer{
      background:rgba(10, 25, 50, 0.55);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:32px;
      box-shadow:
        0 8px 48px 0 rgba(217,180,107,0.18),
        0 2px 32px 0 rgba(127,215,255,0.10),
        0 0 0 2.5px rgba(255,255,255,0.04),
        0 0 120px 0 rgba(123,88,255,0.10);
      overflow:hidden;
      backdrop-filter:blur(18px);
      position:relative;
      transition:box-shadow .3s;
      padding-bottom:var(--footer-height);
    }

    .viewer-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 26px 16px;
      border-bottom:1.5px solid var(--line);
      background:
        linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,0)),
        linear-gradient(90deg,rgba(217,180,107,0.06) 0%,rgba(255,255,255,0) 100%);
      box-shadow:0 2px 18px 0 rgba(217,180,107,0.06);
      backdrop-filter:blur(2.5px);
      position:relative;
      z-index:2;
    }

    .brand-pill{
      font-size:16px;
      font-weight:600;
      padding:8px 18px;
      letter-spacing:.6px;
      border-radius:20px;
      background:linear-gradient(135deg,#1a2a45,#0d1628);
      border:1px solid rgba(255,210,120,0.35);
      box-shadow:0 0 10px rgba(255,210,120,0.25);
      color:#f7f8fb;
      display:inline-flex;
      align-items:center;
      font-family:Arial, Helvetica, sans-serif;
    }

    .date{
      font-size:15px;
      font-weight:500;
      letter-spacing:.5px;
      color:#d9c7a0;
      font-family:Arial, Helvetica, sans-serif;
    }

    .page-wrap{
      padding:22px 22px 24px;
      position:relative;
      z-index:2;
    }

    .page{
      width:min(100%, 794px);
      min-height:1123px;
      margin:0 auto;
      border-radius:24px;
      overflow:hidden;
      position:relative;
      border:2.5px solid var(--gold-soft);
      box-shadow:
        0 0 0 2.5px #d9b46b33 inset,
        0 0 32px #d9b46b33 inset,
        0 0 60px #7fd7ff18 inset,
        0 0 44px 0 rgba(217,180,107,0.13),
        0 2px 24px 0 rgba(127,215,255,0.08);
      background:#0a0d13;
      backdrop-filter:blur(8px) saturate(1.10);
      transition:box-shadow .3s;
    }

    .page-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(7,10,16,.26) 0%, rgba(7,10,16,.22) 18%, rgba(7,10,16,.34) 48%, rgba(7,10,16,.50) 100%),
        linear-gradient(90deg, rgba(11,14,21,.44) 0%, rgba(11,14,21,.24) 40%, rgba(11,14,21,.34) 100%),
        radial-gradient(ellipse at top center, rgba(255,231,176,0.10) 0%, rgba(255,231,176,0.00) 70%);
      pointer-events:none;
      z-index:1;
    }

    .page-content{
      position:relative;
      z-index:2;
      max-width:860px;
      padding:0;
      border-radius:20px;
      background: rgba(8, 18, 35, 0.22);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(8, 20, 40, 0.24);
      overflow:hidden;
      transition:opacity .30s ease, transform .36s ease;
      opacity:1;
      transform:translateY(0);
    }

    .page-content-body{
      position: relative;
      z-index: 2;
      padding:42px 38px 54px;
    }

    .page-content.is-leaving{
      opacity:0;
      transform:translateY(10px);
    }

    .page-title{
      margin:0 0 20px;
      font-size:clamp(36px, 4.4vw, 58px);
      line-height:1.1;
      font-weight:900;
      color:#ffe7b0;
      text-shadow:0 0 24px #d9b46b99, 0 2px 10px #000a, 0 0 2px #fff8;
      letter-spacing:-.3px;
      filter:drop-shadow(0 0 12px #d9b46b66);
    }

    .page-content-body p,
    .page-content-body li{
      margin:0 0 16px;
      font-size:clamp(18px, 1.25vw, 28px);
      line-height:1.72;
      color:#f1f4fb;
      text-shadow:0 1px 4px rgba(0,0,0,.32);
    }

    .page-content-body .author{
      margin-top:28px;
      font-weight:700;
      color:#f7f8fb;
    }

    .page-content-body .author-role{
      font-family:Arial, Helvetica, sans-serif;
      color:#d8deea;
      font-size:15px;
      letter-spacing:.2px;
    }

    .viewer-footer{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:20;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      min-height:var(--footer-height);
      padding:14px 22px 20px;
      border-top:1.5px solid var(--line);
      background:
        linear-gradient(180deg, rgba(11,14,21,.10) 0%, rgba(11,14,21,.75) 18%, rgba(11,14,21,.96) 100%);
      box-shadow:0 -8px 30px 0 rgba(0,0,0,.28);
      backdrop-filter:blur(10px);
    }

    .viewer-footer .nav-btn{
      min-width:110px;
      border:none;
      border-radius:14px;
      padding:15px 26px;
      font-weight:800;
      font-size:20px;
      cursor:pointer;
      color:#ffe7b0;
      background:linear-gradient(180deg,#181818 0%, #232323 100%);
      border:2px solid #d9b46b44;
      box-shadow:0 0 0 #0000;
      transition:.18s;
      letter-spacing:.5px;
      text-shadow:0 0 10px #d9b46b33;
    }

    .viewer-footer .nav-btn:hover:not(:disabled){
      background:linear-gradient(180deg,#ffe7b0 0%, #d9b46b 100%);
      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 22px #ffe7b099, 0 0 2px #fff8;
      filter:drop-shadow(0 0 10px #d9b46b55);
    }

    .viewer-footer .nav-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .counter{
      font-family:Arial, Helvetica, sans-serif;
      color:#e9eef9;
      font-weight:800;
      font-size:18px;
      letter-spacing:.8px;
    }

    @media (max-width:980px){
      .shell{grid-template-columns:1fr;}
      .side-nav{
        position:static;
        display:flex;
        gap:8px;
        padding:10px;
        overflow:auto;
      }
      .side-nav button{
        min-width:56px;
        margin:0;
      }
      .page{min-height:auto;}
      .page-content-body{padding:26px 22px 34px;}
      .page-title{font-size:34px;}
      .page-content-body p,
      .page-content-body li{
        font-size:17px;
        line-height:1.66;
      }
      .page-overlay{
        background:
          linear-gradient(180deg, rgba(7,10,16,.16) 0%, rgba(7,10,16,.14) 18%, rgba(7,10,16,.22) 48%, rgba(7,10,16,.34) 100%),
          linear-gradient(90deg, rgba(11,14,21,.24) 0%, rgba(11,14,21,.12) 40%, rgba(11,14,21,.20) 100%);
      }
    }

    @media (max-width:640px){
      :root{
        --footer-height:88px;
      }

      .viewer-header{padding:16px 16px 12px; gap:10px;}
      .brand-pill{font-size:13px; padding:8px 12px;}
      .date{font-size:12px;}
      .page-wrap{padding:14px 14px 18px;}
      .page-title{font-size:30px;}
      .page-content-body p,
      .page-content-body li{font-size:16px;}
      .viewer-footer{padding:12px 14px 16px;}
      .viewer-footer .nav-btn{min-width:92px; padding:10px 12px;}
      .counter{font-size:16px;}
    }

    @media (prefers-reduced-motion: reduce){
      .bubble{animation-duration:1ms !important; animation-iteration-count:1 !important;}
    }
  </style>
</head>
<body>
  <div id="bgLayer"></div>

  <div class="shell">
    <aside class="side-nav" id="sideNav"></aside>

    <main class="viewer container">
      <div class="viewer-header">
        <div class="brand-pill">Bister Bilal Borsa Akademi</div>
        <div class="date" id="publishDate"></div>
      </div>

      <div class="page-wrap">
        <section class="page">
          <div class="page-overlay"></div>
          <div id="pageContent" class="page-content">
            <div class="inner-bubbles"></div>
            <div id="pageContentBody" class="page-content-body"></div>
          </div>
        </section>
      </div>

      <div class="viewer-footer">
        <button class="nav-btn" id="prevBtn">Önceki</button>
        <div class="counter" id="counter">1 / 3</div>
        <button class="nav-btn" id="nextBtn">Sonraki</button>
      </div>
    </main>
  </div>

  <script>
    const pages = [
      {
        html: `
          <h1 class="page-title">Son Yüzyılın En Büyük Ayıbı: Gücün Deliliği ve İnsanlığın Sınıfta Kalışı</h1>
          <p>Dünya, tarihinin en büyük trajedilerinden ve kırılma noktalarından birini canlı yayında, adeta bir tiyatro oyunu izler gibi seyrediyor tüm Medeniyet. İnsanlığın geldiği bu nokta, yüzyıllardır inşa edildiği iddia edilen o "modern medeniyetin" aslında ne kadar büyük bir yalan, ne kadar riyakar bir illüzyon olduğunu tüm çıplaklığıyla yüzümüze vuruyor.</p>
          <p>Dünyanın en büyük askeri gücüne ve nükleer cephaneliğine hükmeden, ancak akıl sağlığı, tutarsızlığı ve fevriliği tüm dünyaca bilinen bir karakter, sosyal medya hesabı üzerinden binlerce yıllık bir medeniyeti, milyonlarca masum insanı "bu gece" yok etmekten bahsedebiliyor. Ve asıl kan donduran şey bu hastalıklı cüretin kendisi değil; dünyanın geri kalanının bu fütursuzluğa karşı büründüğü o korkak, o sağır edici sessizliktir.</p>
          <p>Bugün, "demokrasi, insan hakları, barış ve evrensel hukuk" masallarıyla kendinden olmayan herkesi hizaya çekmeye çalışan sözde "medeni" ülkelerin maskesi sonsuza dek düşmüştür.</p>
        `
      },
      {
        html: `
          <p>Kendi çıkarları, sınırları veya ekonomileri söz konusu olduğunda dünyayı ayağa kaldıran küresel güçler, uluslararası kurumlar ve insan hakları havarileri; kontrolsüz bir aklın, koca bir coğrafyayı çocuklarıyla, yaşlılarıyla, tarihiyle ve kültürüyle haritadan silme tehdidi karşısında dillerini yutmuş durumdalar. Bu sessizlik diplomatik bir strateji veya denge politikası falan değildir; bu düpedüz suç ortaklığıdır.</p>
          <p>Milyonlarca insanın hayatının, egosunu tatmin etmeye çalışan, kontrolsüz bir kibrin iki dudağı arasına bırakılması 21. yüzyılın, hatta son yüzyılın en büyük ayıbıdır. Medeniyet dediğimiz kavram, devasa binalar dikmek veya uzaya roket göndermekle ölçülmez; medeniyet, gücü elinde bulunduranın zıvanadan çıkmasına karşı tek yürek olup "dur" diyebilme iradesidir.</p>
          <p>Bugün bu irade felç olmuştur. Bir insanın klavye başından verdiği hezeyan dolu bir kararla bir ülkenin üzerine ölüm kusma ihtimaline ses çıkaramayan, bu nobran karaktere sınır çizemeyen her devlet, kendi varlık sebebini inkar etmektedir.</p>
        `
      },
      {
        html: `
          <p>Eğer uluslararası hukuk ve evrensel vicdan, sadece zayıfları ezmek için değil güçlülerin deliliklerini durdurmak için de var olduğunu bugün gösteremeyecekse, o çok övünülen modern medeniyet zaten çoktan çökmüş demektir. İnsanlık bugün o büyük ahlak sınavında sınıfta kalmış; kendi sonunu hazırlayan o tuşa basan zihniyet kadar, bu vahşeti sessizce izleyen "medeni" yığınlar da tarihin kara sayfalarındaki yerini şimdiden almıştır.</p>
          <p class="author">Bilal AKSOY</p>
          <p class="author-role">BBA MarketLab<br>Kurucu &amp; Baş Analist</p>
        `
      }
    ];

    let currentPage = 0;

    const pageContent = document.getElementById("pageContent");
    const pageContentBody = document.getElementById("pageContentBody");
    const counter = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideNav = document.getElementById("sideNav");
    const publishDate = document.getElementById("publishDate");
    const bgLayer = document.getElementById("bgLayer");
    const innerLayer = pageContent.querySelector(".inner-bubbles");

    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    publishDate.textContent = `${day}.${month}.${year}`;

    function makeBubbleNode(bubble, layerType) {
      const node = document.createElement("span");
      node.className = `bubble ${layerType}`;
      node.style.left = `${bubble.left}%`;
      node.style.width = `${bubble.size}px`;
      node.style.height = `${bubble.size}px`;
      node.style.opacity = String(bubble.opacity);
      node.style.animationDelay = `${bubble.delay}s`;
      node.style.animationDuration = `${bubble.duration}s`;
      return node;
    }

    function buildBubbles() {
      if (!bgLayer || !innerLayer) return;
      const bubbles = [
        { left: 3, size: 20, opacity: 0.12, delay: -2, duration: 23 },
        { left: 7, size: 50, opacity: 0.16, delay: -6, duration: 31 },
        { left: 11, size: 120, opacity: 0.09, delay: -10, duration: 38 },
        { left: 16, size: 20, opacity: 0.1, delay: -14, duration: 27 },
        { left: 20, size: 50, opacity: 0.14, delay: -18, duration: 35 },
        { left: 24, size: 120, opacity: 0.08, delay: -22, duration: 40 },
        { left: 29, size: 20, opacity: 0.11, delay: -26, duration: 25 },
        { left: 33, size: 50, opacity: 0.15, delay: -30, duration: 32 },
        { left: 38, size: 120, opacity: 0.09, delay: -34, duration: 39 },
        { left: 43, size: 20, opacity: 0.11, delay: -4, duration: 24 },
        { left: 47, size: 50, opacity: 0.13, delay: -8, duration: 30 },
        { left: 52, size: 120, opacity: 0.08, delay: -12, duration: 37 },
        { left: 57, size: 20, opacity: 0.12, delay: -16, duration: 26 },
        { left: 61, size: 50, opacity: 0.16, delay: -20, duration: 33 },
        { left: 66, size: 120, opacity: 0.09, delay: -24, duration: 40 },
        { left: 71, size: 20, opacity: 0.11, delay: -28, duration: 22 },
        { left: 75, size: 50, opacity: 0.14, delay: -32, duration: 34 },
        { left: 80, size: 120, opacity: 0.08, delay: -36, duration: 38 },
        { left: 85, size: 20, opacity: 0.1, delay: -40, duration: 27 },
        { left: 89, size: 50, opacity: 0.15, delay: -44, duration: 36 },
        { left: 94, size: 120, opacity: 0.08, delay: -48, duration: 39 },
        { left: 97, size: 20, opacity: 0.11, delay: -52, duration: 23 }
      ];

      bubbles.forEach((b) => {
        const outer = makeBubbleNode(b, "outer");
        const inner = outer.cloneNode(true);
        inner.classList.remove("outer");
        inner.classList.add("inner");

        outer.style.opacity = String(Math.max(0.06, b.opacity * 0.75));
        inner.style.opacity = String(Math.min(0.20, b.opacity * 0.68));

        bgLayer.appendChild(outer);
        innerLayer.appendChild(inner);
      });
    }

    function renderSideNav() {
      sideNav.innerHTML = "";
      pages.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        if (index === currentPage) btn.classList.add("active");
        btn.addEventListener("click", () => goToPage(index));
        sideNav.appendChild(btn);
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      pageContentBody.innerHTML = page.html;
      counter.textContent = `${currentPage + 1} / ${pages.length}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      renderSideNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goToPage(index) {
      if (index < 0 || index >= pages.length || index === currentPage) return;

      pageContent.classList.add("is-leaving");

      setTimeout(() => {
        currentPage = index;
        renderPage();
        pageContent.classList.remove("is-leaving");
      }, 220);
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) goToPage(currentPage - 1);
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && currentPage > 0) goToPage(currentPage - 1);
      if (e.key === "ArrowRight" && currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    let touchStartX = null;

    document.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (touchStartX === null || e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - touchStartX;

      if (dx > 60 && currentPage > 0) goToPage(currentPage - 1);
      if (dx < -60 && currentPage < pages.length - 1) goToPage(currentPage + 1);

      touchStartX = null;
    }, { passive: true });

    buildBubbles();
    renderPage();
  </script>
</body>
</html>
