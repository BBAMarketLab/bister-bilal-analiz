<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SON DAKİKA</title>

  <style>
    :root{
      --bg:#05070b;
      --panel:#12141b;
      --panel-2:#0d1016;
      --text:#f2f2f2;
      --muted:#c9ced8;
      --gold:#d9b46b;
      --gold-soft:rgba(217,180,107,.28);
      --cyan:#7fd7ff;
      --line:rgba(255,255,255,.08);
      --shadow:0 0 40px rgba(217,180,107,.08);
      --violet:#d8b4ff;
      --violet-strong:rgba(168,85,247,.55);
      --violet-soft:rgba(168,85,247,.38);
      --footer-height:96px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top,#111827 0%,#07090d 45%,#030406 100%);
      color:var(--text);
      font-family:Georgia, "Times New Roman", serif;
      overflow-x:hidden;
    }

    body{min-height:100vh}

    .shell{
      width:min(1280px, 96vw);
      margin:32px auto;
      display:grid;
      grid-template-columns:88px 1fr;
      gap:18px;
      align-items:start;
    }

    .side-nav{
      background:rgba(13,16,22,.75);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 10px;
      box-shadow:var(--shadow);
      position:sticky;
      top:18px;
      backdrop-filter:blur(10px);
    }

    .side-nav button{
      width:40px;
      height:40px;
      margin:10px 0;
      border-radius:50%;
      border:2px solid #d9b46b44;
      background:linear-gradient(180deg,#181818 0%, #232323 100%);
      color:#ffe7b0;
      font-weight:700;
      font-size:18px;
      cursor:pointer;
      transition:.18s;
      box-shadow:0 0 0 #0000;
    }

    .side-nav button.active{
      background:linear-gradient(180deg,#ffe7b0 0%, #d9b46b 100%);
      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 14px #ffe7b088, 0 0 2px #fff8;
      filter:drop-shadow(0 0 8px #d9b46b55);
    }

    .viewer{
      background:linear-gradient(180deg,rgba(28,24,45,.92),rgba(18,20,27,.96));
      border:1.5px solid rgba(255,255,255,.13);
      border-radius:32px;
      box-shadow:
        0 8px 48px 0 rgba(217,180,107,0.18),
        0 2px 32px 0 rgba(127,215,255,0.10),
        0 0 0 2.5px rgba(255,255,255,0.04),
        0 0 120px 0 rgba(123,88,255,0.10);
      overflow:hidden;
      backdrop-filter:blur(10px) saturate(1.08);
      position:relative;
      transition:box-shadow .3s;
      padding-bottom:var(--footer-height);
    }

    .viewer-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 26px 16px;
      border-bottom:1.5px solid var(--line);
      background:
        linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,0)),
        linear-gradient(90deg,rgba(217,180,107,0.06) 0%,rgba(255,255,255,0) 100%);
      box-shadow:0 2px 18px 0 rgba(217,180,107,0.06);
      backdrop-filter:blur(2.5px);
    }

    .brand-pill{
      font-size:16px;
      font-weight:600;
      padding:8px 18px;
      letter-spacing:.6px;
      border-radius:20px;
      background:linear-gradient(135deg,#1a2a45,#0d1628);
      border:1px solid rgba(255,210,120,0.35);
      box-shadow:0 0 10px rgba(255,210,120,0.25);
      color:#f7f8fb;
      display:inline-flex;
      align-items:center;
      font-family:Arial, Helvetica, sans-serif;
    }

    .date{
      font-size:15px;
      font-weight:500;
      letter-spacing:.5px;
      color:#d9c7a0;
      font-family:Arial, Helvetica, sans-serif;
    }

    .page-wrap{
      padding:22px 22px 24px;
    }

    .page{
      min-height:920px;
      border-radius:24px;
      overflow:hidden;
      position:relative;
      border:2.5px solid var(--gold-soft);
      box-shadow:
        0 0 0 2.5px #d9b46b33 inset,
        0 0 32px #d9b46b33 inset,
        0 0 60px #7fd7ff18 inset,
        0 0 44px 0 rgba(217,180,107,0.13),
        0 2px 24px 0 rgba(127,215,255,0.08);
      background:#0a0d13;
      backdrop-filter:blur(8px) saturate(1.10);
      transition:box-shadow .3s;
    }

    .page-bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(.78) contrast(1.08) saturate(1.12);
      transform:scale(1.02);
      transition:opacity .36s ease, transform .5s ease;
      opacity:1;
    }

    .page-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(7,10,16,.38) 0%, rgba(7,10,16,.32) 18%, rgba(7,10,16,.44) 48%, rgba(7,10,16,.62) 100%),
        linear-gradient(90deg, rgba(11,14,21,.62) 0%, rgba(11,14,21,.38) 40%, rgba(11,14,21,.48) 100%),
        radial-gradient(ellipse at top center, rgba(255,231,176,0.10) 0%, rgba(255,231,176,0.00) 70%);
      pointer-events:none;
      z-index:1;
    }

    .page-content{
      position:relative;
      z-index:2;
      max-width:860px;
      padding:42px 38px 54px;
      transition:opacity .30s ease, transform .36s ease;
      opacity:1;
      transform:translateY(0);
    }

    .page-content.is-leaving{
      opacity:0;
      transform:translateY(10px);
    }

    .page-bg.is-leaving{
      opacity:.2;
      transform:scale(1.04);
    }

    .page-title{
      margin:0 0 18px;
      font-size:clamp(44px, 5vw, 72px);
      line-height:1.08;
      font-weight:900;
      color:#ffe7b0;
      text-shadow:0 0 24px #d9b46b99, 0 2px 10px #000a, 0 0 2px #fff8;
      letter-spacing:-.4px;
      filter:drop-shadow(0 0 12px #d9b46b66);
    }

    .page-subtitle{
      margin:26px 0 12px;
      font-size:clamp(24px, 2.5vw, 38px);
      line-height:1.15;
      font-weight:800;
      color:var(--violet);
      text-shadow:
        0 0 10px var(--violet-strong),
        0 0 22px rgba(168,85,247,.42),
        0 2px 10px rgba(0,0,0,.45);
      filter:drop-shadow(0 0 10px var(--violet-soft));
    }

    .page-content p,
    .page-content li{
      margin:0 0 16px;
      font-size:clamp(18px, 1.25vw, 28px);
      line-height:1.72;
      color:#f1f4fb;
      text-shadow:0 1px 4px rgba(0,0,0,.32);
    }

    .page-content ul{
      margin:0 0 16px 26px;
      padding:0;
    }

    .page-content .author{
      margin-top:28px;
      font-weight:700;
      color:#f7f8fb;
    }

    .page-content .author-role{
      font-family:Arial, Helvetica, sans-serif;
      color:#d8deea;
      font-size:15px;
      letter-spacing:.2px;
    }

    .viewer-footer{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:20;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      min-height:var(--footer-height);
      padding:14px 22px 20px;
      border-top:1.5px solid var(--line);
      background:
        linear-gradient(180deg, rgba(11,14,21,.10) 0%, rgba(11,14,21,.75) 18%, rgba(11,14,21,.96) 100%);
      box-shadow:0 -8px 30px 0 rgba(0,0,0,.28);
      backdrop-filter:blur(10px);
    }

    .viewer-footer .nav-btn{
      min-width:110px;
      border:none;
      border-radius:14px;
      padding:15px 26px;
      font-weight:800;
      font-size:20px;
      cursor:pointer;
      color:#ffe7b0;
      background:linear-gradient(180deg,#181818 0%, #232323 100%);
      border:2px solid #d9b46b44;
      box-shadow:0 0 0 #0000;
      transition:.18s;
      letter-spacing:.5px;
      text-shadow:0 0 10px #d9b46b33;
    }

    .viewer-footer .nav-btn:hover:not(:disabled){
      background:linear-gradient(180deg,#ffe7b0 0%, #d9b46b 100%);
      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 22px #ffe7b099, 0 0 2px #fff8;
      filter:drop-shadow(0 0 10px #d9b46b55);
    }

    .viewer-footer .nav-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .counter{
      font-family:Arial, Helvetica, sans-serif;
      color:#e9eef9;
      font-weight:800;
      font-size:18px;
      letter-spacing:.8px;
    }

    @media (max-width:980px){
      .shell{grid-template-columns:1fr;}
      .side-nav{
        position:static;
        display:flex;
        gap:8px;
        padding:10px;
        overflow:auto;
      }
      .side-nav button{
        min-width:56px;
        margin:0;
      }
      .page{min-height:auto;}
      .page-content{padding:26px 22px 34px;}
      .page-title{font-size:34px;}
      .page-content p,
      .page-content li{
        font-size:17px;
        line-height:1.66;
      }
      .page-overlay{
        background:
          linear-gradient(180deg, rgba(7,10,16,.22) 0%, rgba(7,10,16,.18) 18%, rgba(7,10,16,.28) 48%, rgba(7,10,16,.44) 100%),
          linear-gradient(90deg, rgba(11,14,21,.32) 0%, rgba(11,14,21,.18) 40%, rgba(11,14,21,.28) 100%);
      }
      .page-bg{filter:brightness(.86) contrast(1.12) saturate(1.16);}
    }

    @media (max-width:640px){
      :root{
        --footer-height:88px;
      }

      .viewer-header{padding:16px 16px 12px; gap:10px;}
      .brand-pill{font-size:13px; padding:8px 12px;}
      .date{font-size:12px;}
      .page-wrap{padding:14px 14px 18px;}
      .page-title{font-size:30px;}
      .page-subtitle{font-size:22px;}
      .page-content p,
      .page-content li{font-size:16px;}
      .viewer-footer{padding:12px 14px 16px;}
      .viewer-footer .nav-btn{min-width:92px; padding:10px 12px;}
      .counter{font-size:16px;}
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side-nav" id="sideNav"></aside>

    <main class="viewer">
      <div class="viewer-header">
        <div class="brand-pill">Bister Bilal Borsa Akademi</div>
        <div class="date" id="publishDate"></div>
      </div>

      <div class="page-wrap">
        <section class="page">
          <img id="pageBg" class="page-bg" src="" alt="">
          <div class="page-overlay"></div>
          <div id="pageContent" class="page-content"></div>
        </section>
      </div>

      <div class="viewer-footer">
        <button class="nav-btn" id="prevBtn">Önceki</button>
        <div class="counter" id="counter">1 / 3</div>
        <button class="nav-btn" id="nextBtn">Sonraki</button>
      </div>
    </main>
  </div>

  <script>
    function makeBg(a, b, c) {
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 1000'><defs><radialGradient id='g1' cx='22%' cy='20%' r='62%'><stop offset='0%' stop-color='${a}'/><stop offset='100%' stop-color='#06090f'/></radialGradient><radialGradient id='g2' cx='78%' cy='30%' r='55%'><stop offset='0%' stop-color='${b}' stop-opacity='0.85'/><stop offset='100%' stop-color='${c}' stop-opacity='0.1'/></radialGradient></defs><rect width='1600' height='1000' fill='url(%23g1)'/><rect width='1600' height='1000' fill='url(%23g2)'/></svg>`;
      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    const pages = [
      {
        bg: makeBg("#1a2f55", "#2f4f9e", "#7c53c9"),
        html: `
          <h1 class="page-title">HÜRMÜZ'DE İKİ YÜZLÜ DİPLOMASİ</h1>
          <p>Ekranlarınıza düşen o son dakika açıklamasına çok dikkatli bakmanızı istiyorum. ABD cephesinden Trump kameraların karşısına geçip tam olarak şu iddialı cümleleri kurdu:</p>
          <p>"Hürmüz Boğazı tamamen açıktır ve ticarete, tam geçişe hazırdır. Ancak deniz ablukası, yalnızca İran’a yönelik olarak, İran ile gerçekleştireceğimiz anlaşma %100 tamamlanana kadar tam olarak geçerliliğini koruyacaktır. Müzakere edilmiş noktaların büyük çoğunluğu zaten tamamlandığından bu sürecin çok hızlı ilerlemesi beklenmektedir."</p>
          <p>Kulağa ne kadar da "yapıcı" ve "çözüm odaklı" geliyor değil mi? İşte büyük güçlerin satranç tahtasında bazen en gürültülü barış çığlıkları, aslında en derin stratejik kuşatmaları gizlemek için atılır.</p>
          <p>Bir yandan dünyaya "Boğaz tamamen açık, ticaret güvende" denilerek kusursuz bir PR çalışması yapılıyor; diğer yandan ise "anlaşma bitene kadar askeri abluka sürecek" diyerek silahın namlusu masanın tam ortasında tutulmaya devam ediliyor.</p>
          <p>Son günlerde Orta Doğu ekseninde yaşanan gelişmelere, özellikle de ABD'nin adeta soluklanmak için talep ettiği ve sürekli "anlaşmaya çok yakınız" diyerek süreci uzattığı diğer ateşkes hamlelerine tam da bu gözle bakmamız gerekiyor.</p>
          <p>Sahadaki gerçeklere baktığımızda, ortada net ve açık bir stratejik tıkanma, hatta örtülü bir yenilgi var. Ancak bunu kabul etmek yerine, tıpkı Trump'ın açıklamasında olduğu gibi, bir Hollywood filminin galasındaymışçasına her platformda "Muazzam bir zafer elde ettik, harika bir iş çıkardık" söylemleriyle dünyayı efsunlamaya çalışıyorlar.</p>
          <p>Aslında bu devasa göz boyama kampanyasının tek bir amacı var: Amerika'nın artık o eski, istediğini anında dikte eden "yenilmez süper güç" olmadığı gerçeğinin üzerini örtmek.</p>
        `
      },
      {
        bg: makeBg("#15243f", "#274a77", "#2ba7d5"),
        html: `
          <h1 class="page-title">HÜRMÜZ'DE İKİ YÜZLÜ DİPLOMASİ</h1>
          <p>Burada hepimizin çok ama çok dikkat etmesi gereken kritik bir nokta var. Bize "barışın müjdecisi" gibi sunulan Lübnan hattındaki bu ateşkes de, tıpkı Hürmüz'deki o sözde "açık kapı" politikası gibi süresi ve sınırları belli, son derece kırılgan bir taktiksel moladan ibaret.</p>
          <p>Dolayısıyla, karşımızdaki aktörün; yani İsrail'in o kural tanımaz, uluslararası hukuku defalarca ve sistematik olarak hiçe sayan, savaş suçları işlemekten çekinmeyen agresif profilini asla göz ardı edemeyiz.</p>
          <p>İşte tam da bu yüzden kendimize o can alıcı soruyu sormak zorundayız:</p>
          <p>Eğer Trump'ın iddia ettiği gibi "her şey %100 yolunda" ise ve gerçekten kalıcı bir barış isteniyorsa, neden Orta Doğu'ya ve özellikle İsrail'e yönelik o aralıksız askeri nakliye bütün hızıyla devam ediyor?</p>
          <p>Kameralar önünde diplomatik tebessümler dağıtılırken, arka planda kargo uçakları ve devasa gemilerle bölgeye son derece büyük bir askeri yığınak yapılmaya devam ediliyor.</p>
          <p>Barışa ve ticarete hazırlanan bir ordu, neden tarihinin en büyük cephanelik transferlerinden birini gerçekleştirir?</p>
          <p>Bu korkunç çelişki, asıl niyetin ne olduğunu bize açıkça haykırıyor.</p>
        `
      },
      {
        bg: makeBg("#1d1738", "#5b2f7d", "#3684ba"),
        html: `
          <h1 class="page-title">HÜRMÜZ'DE İKİ YÜZLÜ DİPLOMASİ</h1>
          <p>Tüm bu verileri alt alta koyduğumuzda, tablo son derece net bir şekilde karşımıza çıkıyor.</p>
          <p>Ortada güvenebileceğimiz dürüst bir "barış iradesi" yok.</p>
          <p>Şimdi asıl mesele şu:</p>
          <p>Bu oyalama taktiklerinin ve perde arkasındaki devasa askeri yığınağın sonucunda o beklenen kalıcı anlaşma gerçekten masadan çıkacak mı?</p>
          <p>Yoksa bu ateşkes ve "boğazlar açık" söylemleri, tıpkı daha önce tarihte defalarca örneğini gördüğümüz gibi, düşmanı rehavete sürükleyip aniden, çok daha yıkıcı bir şekilde saldırmak için hazırlanan devasa bir sis perdesi mi?</p>
          <p>ABD ve İsrail ekseninin güvenilmezliği bize tek bir şey söylüyor:</p>
          <p>Geçmişin acı tecrübeleri, her zaman en kötüsüne hazırlıklı olmamızı emreder.</p>
          <p>Bunu hep birlikte izleyip göreceğiz; ancak o güne kadar sermayemizi, stratejimizi ve gardımızı asla düşürmemeliyiz.</p>
          <p class="author">Bilal AKSOY</p>
          <p class="author-role">BBA MarketLab<br>Kurucu & Baş Analist</p>
        `
      }
    ];

    let currentPage = 0;

    const pageBg = document.getElementById("pageBg");
    const pageContent = document.getElementById("pageContent");
    const counter = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideNav = document.getElementById("sideNav");
    const publishDate = document.getElementById("publishDate");

    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    publishDate.textContent = `${day}.${month}.${year}`;

    function renderSideNav() {
      sideNav.innerHTML = "";
      pages.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        if (index === currentPage) btn.classList.add("active");
        btn.addEventListener("click", () => goToPage(index));
        sideNav.appendChild(btn);
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      pageBg.src = page.bg;
      pageContent.innerHTML = page.html;
      counter.textContent = `${currentPage + 1} / ${pages.length}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      renderSideNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goToPage(index) {
      if (index < 0 || index >= pages.length || index === currentPage) return;

      pageContent.classList.add("is-leaving");
      pageBg.classList.add("is-leaving");

      setTimeout(() => {
        currentPage = index;
        renderPage();
        pageContent.classList.remove("is-leaving");
        pageBg.classList.remove("is-leaving");
      }, 220);
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) goToPage(currentPage - 1);
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && currentPage > 0) goToPage(currentPage - 1);
      if (e.key === "ArrowRight" && currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    let touchStartX = null;

    document.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (touchStartX === null || e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - touchStartX;

      if (dx > 60 && currentPage > 0) goToPage(currentPage - 1);
      if (dx < -60 && currentPage < pages.length - 1) goToPage(currentPage + 1);

      touchStartX = null;
    }, { passive: true });

    renderPage();
  </script>
</body>
</html>
