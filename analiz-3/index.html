          <h1 class="page-title">Gerçek Hedef: Büyük İsrail mi, Küresel Düzen mi?</h1>
          <p>Ortadoğu’da bazı savaşlar top sesleriyle başlamaz. Önce bir ekran kararır, sonra bir radar susar, ardından bir hava savunma sistemi aynı anda onlarca hedefi ayıklamaya çalışırken gökyüzü birden ateşe keser. 28 Şubat 2026’da yaşananlar da böyle bir eşiğe işaret ediyor. İlk bakışta tablo basit gibi görünüyor: İsrail ile İran arasındaki düşmanlık yeniden alevlenmiş, Amerika da müttefikine destek vermiş gibi. Fakat biraz derine inildiğinde, bu savaşın yalnızca İran’ın nükleer programı ya da İsrail’in güvenliğiyle açıklanamayacak kadar büyük olduğu anlaşılıyor. Çünkü bugün Ortadoğu’da yaşanan şey, sadece iki ülkenin çatışması değil; aynı zamanda bölgesel haritaların, enerji yollarının, güvenlik mimarisinin ve küresel güç dengesinin yeniden yazılma girişimidir.</p>
          <p>Amerika’daki bazı eski devlet aklı temsilcileri bu noktaya özellikle dikkat çekiyor. Reagan döneminde görev almış isimlerden Paul Craig Roberts gibi çevreler, İran’ın nükleer meselesinin uzun zamandır daha büyük bir hesabın bahanesi olarak kullanıldığını söylüyor. Bu bakışa göre asıl mesele, İran’ın askeri kapasitesinden çok, İsrail’in önünde duran büyük jeopolitik engelin temizlenmesi. İsrail tarafında yıllardır kullanılan dil de bunu destekliyor. Çünkü Tel Aviv açısından İran sıradan bir rakip değil; uzun vadeli, ideolojik ve askeri olarak varlığına yönelmiş bir tehdit olarak görülüyor. Bu yüzden İsrail’in hedefi yalnızca birkaç tesisi vurmak ya da İran’ı masaya oturtmak değil; İran’ın bölgesel etkisini kırmak, vekil ağını dağıtmak, askeri caydırıcılığını felç etmek ve mümkünse rejimi içten zayıflatmak. İsrail’in savaşa bakışı bir güvenlik operasyonundan çok, gelecekte karşısına çıkabilecek tüm tehditleri daha bugünden budama mantığına dayanıyor.</p>
          <p>Fakat Amerikan tarafına geçildiğinde hikâye biraz değişiyor. Washington’un İran dosyasına bakışı Tel Aviv kadar dar değil; çok daha geniş, çok daha küresel bir çerçeveye oturuyor. Amerika için İran yalnızca İsrail’i tehdit eden bir aktör değil, aynı zamanda Çin’le yakınlaşan, Rusya’yla koordinasyon kuran, enerji yolları üzerinde baskı kurabilen ve Körfez mimarisini sarsabilecek bir merkez. Asya’daki yorumlara bakıldığında da zaten tam burada ikinci bir satranç tahtası açılıyor. Bölgedeki birçok gözlemciye göre, bugün Ortadoğu’da görünen savaşın arkasında aslında Washington ile Pekin arasındaki uzun mücadele var. İran, bu büyük mücadelenin Ortadoğu cephesindeki kilit taşı haline gelmiş durumda. Çünkü İran Batı’dan kopup Çin eksenine daha fazla yaklaştıkça, Amerika için mesele sadece Tahran değil, küresel düzenin çözülmeye başlayan halkaları oluyor. Bu nedenle Washington’daki bazı stratejik çevreler, İran’da tam bir rejim çöküşünden çok, tepedeki dirençli yapının değiştirilmesini, ama devletin tamamen dağılmamasını tercih edecek bir senaryoyu daha gerçekçi görüyor.</p>
          <p>Tam da bu yüzden bugün aynı cephede duran Amerika ile İsrail, gerçekte aynı savaşı vermiyor. İsrail için mesele varoluşsal ve acil. İran’ın nükleer kapasitesi, balistik füze gücü, Hizbullah ve diğer vekil yapılara sağladığı destek, İsrail’in gözünde ertelenemez bir ölüm kalım başlığı. Amerika içinse tablo daha hesaplı. Washington, Hürmüz Boğazı’nı açık tutmak, petrol akışını korumak, Körfez monarşilerini ayakta tutmak, Çin ve Rusya’nın boşluklardan yararlanmasını engellemek ve bütün bunları yaparken yeni bir Irak ya da Afganistan bataklığına saplanmamak istiyor. Yani Amerika İran’ı tamamen çökertmekten çok, zayıflatılmış ama kontrol edilebilir hale getirilmiş bir İran’ı daha kabul edilebilir görüyor. İşte savaşın en kritik fay hattı tam burada başlıyor: Aynı düşmana karşı yürüyen iki müttefik, aynı zafer tanımına sahip değil.</p>

          <p>Sahadaki askeri tabloya bakıldığında ise Amerika ile İsrail arasındaki entegrasyonun artık tarihte az görülen bir seviyeye çıktığı anlaşılıyor. Son yıllarda kurulan ortak hava savunma ağları, koordineli radar sistemleri, ortak tatbikatlar ve komuta yapıları, iki ülke arasındaki ilişkinin klasik müttefiklik sınırını çoktan aştığını gösteriyor. Özellikle İsrail’in Avrupa Komutanlığı’ndan çıkarılıp CENTCOM yapısına bağlanması, sadece teknik bir değişiklik değildi; İsrail’in Arap dünyasıyla aynı stratejik güvenlik çerçevesine yerleştirilmesiydi. Bu adım, sonraki dönemde Suudi Arabistan, BAE, Bahreyn ve diğer bölgesel aktörlerle oluşacak normalleşme ve güvenlik ortaklıklarının da askeri altyapısını hazırladı. 2023’te yapılan büyük tatbikatlar, sonrasında İran’ın saldırılarına karşı geliştirilen çok uluslu hava savunma kalkanı ve 2024 boyunca yaşanan füze krizleri, bu yapının sadece kâğıt üstünde olmadığını, fiilen çalıştığını gösterdi.</p>
          <p>Yine de geçmişte Washington kendine bir sınır koymaya çalışıyordu. Biden döneminde kullanılan dilde temel vurgu hep savunma üzerineydi. İsrail korunur, Amerikan üsleri savunulur, bölgesel savaş önlenir, ama Amerika doğrudan saldırı savaşının ön saflarına geçmezdi. Şimdi ise o eski denge büyük ölçüde aşılmış görünüyor. Çünkü artık Amerika yalnızca İsrail’in hava savunmasını destekleyen bir aktör gibi değil; operasyonel sonuçların içine daha doğrudan gömülmüş bir güç gibi duruyor. Bu değişiklik savaşın hem süresini hem de kapsamını etkiliyor. Çünkü bir yerde Amerika’nın aktif ağırlığı arttıkça, İran da buna göre cevap veriyor ve çatışma bölgesel olmaktan çıkıp küresel sonuçlar üreten bir krize dönüşüyor.</p>
          <p>Savaşın başında kimi çevreler bu işin kısa süreceğini düşündü. Yoğun bombardıman, komuta merkezlerinin hedef alınması, ekonomik baskı ve psikolojik savaşla birlikte İran rejiminin birkaç gün ya da birkaç hafta içinde çözülebileceği varsayıldı. Fakat bu hesabın eksik olduğu kısa sürede ortaya çıktı. İran, beklenenden daha sert ve daha organize bir direnç gösterdi. Bunun nedeni yalnızca askeri kapasite değil; rejim mantığının kendisi. İran gibi ideolojik yapılarda dış saldırı, çoğu zaman iç çözülmeyi hızlandırmaz; tersine yönetici kadroların tabanlarını daha sıkı toparlamasına yardım eder. İran’da teslimiyet, içeride rejimin meşruiyetini parçalayıcı bir etki yaratabilir. Oysa savaş, ne kadar ağır olursa olsun, “kuşatılmış ülke” duygusunu besler ve rejimin çekirdeğini sertleştirir. Bu nedenle Tahran için bazen geri adım atmak değil, ağır darbeyi göğüslemek daha güvenli bir siyasi tercih haline gelir.</p>

          <p>Bugün hem Washington’da hem Asya’da hem de Ortadoğu’nun kendi başkentlerinde konuşulan ortak mesele şu: Bu savaş planlandığı gibi kısa, temiz ve kontrollü kalmayabilir. Çünkü sahada yanlış hesapların bedeli ağırlaşıyor. İran rejiminin birkaç darbeyle çökmeyeceği anlaşıldı. Körfez’in güvenlik mimarisinin sanıldığı kadar sağlam olmadığı görüldü. Amerika’nın maliyet hesabı büyüyor. İsrail’in güvenlik arayışı ise savaşı sınırlamaktan çok derinleştirme eğilimi taşıyor. Böyle anlarda tarih bir anda yön değiştirmez; önce uzun uzun gerilir, sonra bir kırılma noktası gelir. Şimdi herkes o kırılma noktasının ne olacağını bekliyor.</p>

      },
      {
        bg: "5.png",
        html: `
          <p>Önümüzde üç temel senaryo var gibi görünüyor. Birinci senaryo, Amerika’nın ve İsrail’in arzuladığı ölçüde olmasa bile İran’da ciddi bir çözülme yaşanması ve yönetim yapısının köklü şekilde değişmesi. Ancak bu ihtimal bugün için en zor senaryolardan biri. Çünkü İran sıradan bir devlet değil; büyük nüfusu, ideolojik devlet yapısı, güvenlik aygıtı ve bölgesel ağlarıyla dış müdahaleyle kolayca devrilecek bir ülke görünümü vermiyor. Irak ve Afganistan tecrübeleri ortadayken, 90 milyonu aşan, coğrafi olarak derin ve siyasi olarak karmaşık bir ülkeyi birkaç haftalık bombardımanla dönüştürmek gerçekçi görünmüyor. İkinci senaryo, şu anda yaşananlara daha yakın: Uzayan savaş, büyüyen mühimmat krizi, ekonomik baskı, bölgesel yıpranma ve sonunda zoraki bir müzakere. Ama burada da mesele şu: Taraflar masaya otursa bile, hangi şartlarda oturacak? Zayıflayan ama yıkılmayan İran mı, geri adım atmak istemeyen İsrail mi, yoksa yüzünü kurtarmaya çalışan Washington mı? Üçüncü senaryo ise en karanlık olanı. Savaşın Lübnan, Suriye ve Irak üzerinden daha da genişlemesi, Hizbullah’ın daha büyük ölçekte devreye girmesi, Körfez ülkelerinin açık askeri taraf haline gelmesi ve petrol fiyatlarının küresel ekonomiyi sarsacak seviyelere çıkması. O durumda mesele artık Ortadoğu savaşı olmaktan çıkar, dünya ekonomisinin sinir sistemini vuran bir krize dönüşür.</p>

          <p class="author">BİLAL AKSOY</p>
          <p class="author-role">Kurucu & Baş Analist</p>

      }
    ];

    let currentPage = 0;

    const pageBg = document.getElementById("pageBg");
    const pageContent = document.getElementById("pageContent");
    const counter = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideNav = document.getElementById("sideNav");
    const publishDate = document.getElementById("publishDate");

    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    publishDate.textContent = `${day}.${month}.${year}`;

    function renderSideNav() {
      sideNav.innerHTML = "";
      pages.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        if (index === currentPage) btn.classList.add("active");
        btn.addEventListener("click", () => goToPage(index));
        sideNav.appendChild(btn);
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      pageBg.src = page.bg;
      pageContent.innerHTML = page.html;
      counter.textContent = `${currentPage + 1} / ${pages.length}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      renderSideNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goToPage(index) {
      if (index < 0 || index >= pages.length || index === currentPage) return;

      pageContent.classList.add("is-leaving");
      pageBg.classList.add("is-leaving");

      setTimeout(() => {
        currentPage = index;
        renderPage();
        pageContent.classList.remove("is-leaving");
        pageBg.classList.remove("is-leaving");
      }, 220);
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) goToPage(currentPage - 1);
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && currentPage > 0) goToPage(currentPage - 1);
      if (e.key === "ArrowRight" && currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    let touchStartX = null;

    document.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (touchStartX === null || e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - touchStartX;

      if (dx > 60 && currentPage > 0) goToPage(currentPage - 1);
      if (dx < -60 && currentPage < pages.length - 1) goToPage(currentPage + 1);

      touchStartX = null;
    }, { passive: true });

    renderPage();
  </script>
